<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Godfidence">
<meta name="theme-color" content="#fafaf8">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.png">
<title>Godfidence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a18;
    --muted: #9a9890;
    --accent: #c8a96e;
    --accent-soft: #f5efe4;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overscroll-behavior: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    background: var(--bg);
  }
  .header {
    padding: calc(20px + var(--safe-top)) 24px 0;
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .logo-name {
    font-family: 'Cormorant', serif;
    font-size: 30px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
  }
  .logo-sub {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .header-icon {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--accent);
  }
  .search-wrap { margin-bottom: 24px; }
  #searchInput {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  #searchInput::placeholder { color: var(--muted); }
  #searchInput:focus { border-color: var(--accent); }
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 24px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }
  .pdf-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px;
    padding-bottom: calc(24px + var(--safe-bottom));
    -webkit-overflow-scrolling: touch;
  }
  .pdf-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .pdf-card:active { transform: scale(0.98); }
  .pdf-card:hover { border-color: var(--accent); }
  .pdf-title {
    font-family: 'Cormorant', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 2px;
  }
  .pdf-meta {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .pdf-arrow { color: var(--muted); font-size: 20px; }
  #viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    flex-direction: column;
  }
  #viewer.open { display: flex; }
  .viewer-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: calc(14px + var(--safe-top)) 20px 14px;
    border-bottom: 1px solid var(--border);
    background: #fff;
    flex-shrink: 0;
  }
  .viewer-bar button {
    padding: 8px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
  }
  #viewerTitle {
    font-family: 'Cormorant', serif;
    font-size: 20px;
    font-weight: 400;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #pdfFrame {
    flex: 1;
    width: 100%;
    border: none;
    background: var(--bg);
  }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo-name">Godfidence</div>
        <div class="logo-sub">Your Library</div>
      </div>
      <div class="header-icon">★</div>
    </div>
    <div class="search-wrap">
      <input type="search" id="searchInput" placeholder="Search…" oninput="filterPDFs(this.value)">
    </div>
  </div>

  <div class="section-label" id="countLabel">All Documents</div>
  <div class="pdf-list" id="pdfList"></div>
</div>

<div id="viewer">
  <div class="viewer-bar">
    <button onclick="closeViewer()">← Back</button>
    <div id="viewerTitle">Document</div>
  </div>
  <iframe id="pdfFrame" src=""></iframe>
</div>

<script>
  const pdfs = [
    { title: "Monday",    category: "Day 1", url: "./monday.pdf" },
    { title: "Tuesday",   category: "Day 2", url: "./tuesday.pdf" },
    { title: "Wednesday", category: "Day 3", url: "./wednesday.pdf" },
    { title: "Thursday",  category: "Day 4", url: "./thursday.pdf" },
    { title: "Friday",    category: "Day 5", url: "./friday.pdf" },
    { title: "Saturday",  category: "Day 6", url: "./saturday.pdf" },
    { title: "Sunday",    category: "Day 7", url: "./sunday.pdf" },
  ];

  const list = document.getElementById("pdfList");
  const countLabel = document.getElementById("countLabel");

  function render(items) {
    list.innerHTML = "";
    countLabel.textContent = items.length === pdfs.length
      ? `All Documents · ${pdfs.length}`
      : `${items.length} result${items.length !== 1 ? "s" : ""}`;
    items.forEach(pdf => {
      const div = document.createElement("div");
      div.className = "pdf-card";
      div.innerHTML = `
        <div>
          <div class="pdf-title">${pdf.title}</div>
          <div class="pdf-meta">${pdf.category}</div>
        </div>
        <div class="pdf-arrow">›</div>
      `;
      div.onclick = () => openViewer(pdf);
      list.appendChild(div);
    });
  }

  function filterPDFs(q) {
    q = q.toLowerCase().trim();
    render(q ? pdfs.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q)
    ) : pdfs);
  }

  function openViewer(pdf) {
    window.open(pdf.url, "_blank");
  }

  function closeViewer() {
    document.getElementById("viewer").classList.remove("open");
    document.getElementById("pdfFrame").src = "";
    document.body.style.overflow = "";
  }

  render(pdfs);
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js');
  }
</script>

</body>
</html>
