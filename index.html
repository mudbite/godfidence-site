<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- iPhone / PWA mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Godfidence">

<meta name="theme-color" content="#fafaf8">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<title>Godfidence</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --border: #e8e6e0;
  --text: #1a1a18;
  --muted: #9a9890;
  --accent: #c8a96e;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
}

.header {
  padding: calc(16px + var(--safe-top)) 24px 0;
}

.header-top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.logo-name {
  font-family: 'Cormorant', serif;
  font-size: 30px;
}

.logo-sub {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.2em;
}

.header-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #f5efe4;
  display: flex;
  align-items: center;
  justify-content: center;
}

.search-wrap {
  margin-bottom: 20px;
}

#searchInput {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  outline: none;
}

.section-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--muted);
  padding: 0 24px;
  margin-bottom: 12px;
}

.pdf-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px;
  padding-bottom: calc(24px + var(--safe-bottom));
}

.pdf-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  background: var(--surface);
  cursor: pointer;
}

.pdf-title {
  font-family: 'Cormorant', serif;
  font-size: 17px;
}

.pdf-meta {
  font-size: 11px;
  color: var(--muted);
}

#viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: white;
  z-index: 100;
  flex-direction: column;
}

#viewer.open {
  display: flex;
}

.viewer-bar {
  display: flex;
  align-items: center;
  padding: calc(14px + var(--safe-top)) 16px;
  border-bottom: 1px solid var(--border);
}

#pdfFrame {
  flex: 1;
  width: 100%;
  border: none;
}
</style>
</head>

<body>

<div id="app">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo-name">Godfidence</div>
        <div class="logo-sub">Your Library</div>
      </div>
      <div class="header-icon">★</div>
    </div>

    <div class="search-wrap">
      <input type="search" id="searchInput" placeholder="Search…" oninput="filterPDFs(this.value)">
    </div>
  </div>

  <div class="section-label" id="countLabel">All Documents</div>

  <div class="pdf-list" id="pdfList"></div>

</div>

<!-- Viewer -->
<div id="viewer">
  <div class="viewer-bar">
    <button onclick="closeViewer()">Back</button>
    <div id="viewerTitle">Document</div>
  </div>
  <iframe id="pdfFrame"></iframe>
</div>

<script>
const pdfs = [
  { title: "Monday", category: "Day 1", url: "files/monday.pdf" },
  { title: "Tuesday", category: "Day 2", url: "files/tuesday.pdf" },
  { title: "Wednesday", category: "Day 3", url: "files/wednesday.pdf" },
  { title: "Thursday", category: "Day 4", url: "files/thursday.pdf" },
  { title: "Friday", category: "Day 5", url: "files/friday.pdf" },
  { title: "Saturday", category: "Day 6", url: "files/saturday.pdf" },
  { title: "Sunday", category: "Day 7", url: "files/sunday.pdf" }
];

const list = document.getElementById("pdfList");
const countLabel = document.getElementById("countLabel");

function render(items) {
  list.innerHTML = "";
  countLabel.textContent = `${items.length} Documents`;

  items.forEach(pdf => {
    const div = document.createElement("div");
    div.className = "pdf-card";
    div.innerHTML = `
      <div>
        <div class="pdf-title">${pdf.title}</div>
        <div class="pdf-meta">${pdf.category}</div>
      </div>
    `;
    div.onclick = () => openViewer(pdf);
    list.appendChild(div);
  });
}

function filterPDFs(q) {
  q = q.toLowerCase();
  render(pdfs.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.category.toLowerCase().includes(q)
  ));
}

function openViewer(pdf) {
  document.getElementById("viewer").classList.add("open");
  document.getElementById("viewerTitle").textContent = pdf.title;
  document.getElementById("pdfFrame").src = pdf.url;
  document.body.style.overflow = "hidden";
}

function closeViewer() {
  document.getElementById("viewer").classList.remove("open");
  document.getElementById("pdfFrame").src = "";
  document.body.style.overflow = "";
}

render(pdfs);
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
